<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepaExamen - Formulario Secundaria</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SUBJECTS = [
            "HISTORIA UNIVERSAL",
            "HISTORIA DE MÉXICO",
            "FÍSICA",
            "QUIMICA",
            "GEOGRAFÍA",
            "BIOLOGÍA",
            "MATEMÁTICAS",
            "ESPAÑOL"
        ];

        const MathFormula = ({ label, children }) => (
            <div className="flex flex-col items-center bg-white border border-gray-200 rounded-lg p-3 shadow-sm min-w-[120px]">
                <span className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">{label}</span>
                <div className="font-serif text-xl text-gray-800 flex items-center">
                    {children}
                </div>
            </div>
        );

        const Fraction = ({ top, bottom }) => (
            <div className="flex flex-col items-center mx-1">
                <span className="border-b border-gray-800 px-1 leading-none pb-1">{top}</span>
                <span className="leading-none pt-1">{bottom}</span>
            </div>
        );

        const EventCard = ({ title, period, desc, chars, causes, consequences, timeline }) => (
            <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex flex-col h-full hover:shadow-md transition-shadow">
                <h3 className="font-bold text-lg text-indigo-900 mb-1 leading-tight">{title}</h3>
                {period && <span className="inline-block bg-indigo-50 text-indigo-700 text-xs px-2 py-1 rounded font-bold tracking-wide mb-3">{period}</span>}
                <p className="text-sm text-gray-700 mb-4 leading-relaxed">{desc}</p>
                
                {/* CRONOLOGÍA */}
                {timeline && timeline.length > 0 && (
                    <div className="mb-4">
                        <h4 className="font-bold text-xs text-gray-500 uppercase mb-2">⏱ Cronología Clave</h4>
                        <ul className="border-l-2 border-indigo-200 ml-2 space-y-2">
                            {timeline.map((t, i) => (
                                <li key={i} className="pl-3 relative text-sm">
                                    <span className="absolute -left-[5px] top-1.5 w-2 h-2 rounded-full bg-indigo-400"></span>
                                    <strong className="text-gray-800">{t.year}:</strong> <span className="text-gray-600">{t.event}</span>
                                </li>
                            ))}
                        </ul>
                    </div>
                )}
                
                {/* CAUSAS, PERSONAJES Y CONSECUENCIAS */}
                <div className="mt-auto space-y-2 text-xs">
                    {causes && (
                        <div className="bg-orange-50 p-2.5 rounded-lg border-l-4 border-orange-400">
                            <span className="font-bold text-orange-800 block mb-0.5">🔙 Causas (Origen):</span> 
                            <span className="text-orange-900">{causes}</span>
                        </div>
                    )}
                    {chars && (
                        <div className="bg-blue-50 p-2.5 rounded-lg border-l-4 border-blue-400">
                            <span className="font-bold text-blue-800 block mb-0.5">👤 Personajes Importantes:</span> 
                            <span className="text-blue-900">{chars}</span>
                        </div>
                    )}
                    {consequences && (
                        <div className="bg-emerald-50 p-2.5 rounded-lg border-l-4 border-emerald-400">
                            <span className="font-bold text-emerald-800 block mb-0.5">🔜 Consecuencias:</span> 
                            <span className="text-emerald-900">{consequences}</span>
                        </div>
                    )}
                </div>
            </div>
        );

        const HistoryBlock = ({ title, colorClass, imageUrl, imageAlt, children }) => {
            const [imgSrc, setImgSrc] = useState(imageUrl);
            return (
                <div className="mb-10 bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    {/* BANNER DE IMAGEN (Responsivo) */}
                    <div className="h-32 md:h-48 w-full relative bg-gray-800">
                        <img 
                            src={imgSrc} 
                            alt={imageAlt} 
                            className="w-full h-full object-cover opacity-60 mix-blend-overlay"
                            onError={() => setImgSrc('https://images.unsplash.com/photo-1461360370896-922624d12aa1?auto=format&fit=crop&w=1200&q=80')}
                        />
                        <div className={`absolute inset-0 ${colorClass} mix-blend-color opacity-50`}></div>
                        <div className="absolute inset-0 flex items-center px-6 md:px-8">
                            <h2 className="text-xl md:text-3xl font-black text-white drop-shadow-lg">{title}</h2>
                        </div>
                    </div>
                    <div className="p-4 md:p-6 grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6 bg-gray-50/50">
                        {children}
                    </div>
                </div>
            );
        };
// --- VISTA DE MATEMÁTICAS ---
        const MatematicasView = () => (
             <div className="animate-fade-in space-y-8">
                 <div className="mb-8 text-center md:text-left">
                     <h2 className="text-2xl md:text-3xl font-black text-gray-800">Matemáticas</h2>
                     <p className="text-gray-500 mt-1">Aritmética, Álgebra, Estadística y Geometría.</p>
                 </div>
                 
                 {/* BLOQUE 1 Y 2: NÚMEROS Y ÁLGEBRA */}
                 <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-8">
                     <div className="bg-indigo-600 px-6 py-4">
                         <h2 className="text-lg font-bold text-white">1 y 2. Números y Álgebra</h2>
                     </div>
                     <div className="p-4 md:p-8 bg-slate-50 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                         
                         {/* Jerarquía en Pirámide y Porcentajes */}
                         <div className="bg-white p-5 rounded-xl border border-indigo-100 shadow-sm flex flex-col justify-center items-center">
                             <h3 className="font-black text-indigo-800 mb-4 border-b pb-2 w-full text-center">Jerarquía de Operaciones</h3>
                             
                             {/* Pirámide CSS */}
                             <div className="flex flex-col items-center space-y-1 mb-5 w-full drop-shadow-sm">
                                 <div className="w-16 bg-indigo-600 text-white text-center text-xs py-1 rounded-t-lg font-bold z-40">( ) [ ]</div>
                                 <div className="w-24 bg-indigo-500 text-white text-center text-xs py-1 font-bold z-30">x² , √</div>
                                 <div className="w-32 bg-indigo-400 text-white text-center text-xs py-1 font-bold z-20">× , ÷</div>
                                 <div className="w-40 bg-indigo-300 text-indigo-900 text-center text-xs py-1 rounded-b-lg font-bold z-10">+ , -</div>
                             </div>

                             <div className="bg-indigo-50 p-3 rounded-lg flex items-center justify-between w-full mt-auto">
                                 <span className="font-bold text-indigo-900 text-sm">Regla de 3 (%):</span>
                                 <div className="flex flex-col items-center font-mono text-indigo-800 font-bold">
                                     <span className="border-b border-indigo-800 px-2">x% · Total</span>
                                     <span>100</span>
                                 </div>
                             </div>
                         </div>

                         {/* Productos Notables */}
                         <div className="bg-white p-5 rounded-xl border border-blue-100 shadow-sm flex flex-col justify-center">
                             <h3 className="font-black text-blue-800 mb-3 border-b pb-2 text-center">Productos Notables</h3>
                             <div className="space-y-4 text-center font-serif text-lg text-gray-800 mt-2">
                                 <div>
                                     <span className="block text-xs font-sans text-gray-500 uppercase tracking-widest font-bold mb-1">Ley Distributiva</span>
                                     <span className="bg-blue-50 px-3 py-1 rounded">a(x+y) = ax + ay</span>
                                 </div>
                                 <div>
                                     <span className="block text-xs font-sans text-gray-500 uppercase tracking-widest font-bold mb-1">Binomio al Cuadrado</span>
                                     <span className="bg-blue-50 px-3 py-1 rounded">(a+b)² = a² + 2ab + b²</span>
                                 </div>
                                 <div>
                                     <span className="block text-xs font-sans text-gray-500 uppercase tracking-widest font-bold mb-1">Diferencia de Cuadrados</span>
                                     <span className="bg-blue-50 px-3 py-1 rounded">a² - b² = (a+b)(a-b)</span>
                                 </div>
                             </div>
                         </div>

                         {/* Fórmula General (Chicharronera) */}
                         <div className="bg-white p-5 rounded-xl border-2 border-amber-200 shadow-sm flex flex-col justify-center lg:col-span-1 md:col-span-2">
                             <h3 className="font-black text-amber-800 mb-2 border-b pb-2 text-center">Ecuación de 2do Grado</h3>
                             <p className="text-center text-xs text-gray-500 mb-4 font-mono">ax² + bx + c = 0</p>
                             
                             <div className="flex justify-center w-full overflow-x-auto py-2">
                                 <div className="bg-amber-50 p-4 rounded-xl border border-amber-100 flex items-center font-serif text-xl sm:text-2xl text-gray-900 whitespace-nowrap">
                                     <span className="mr-3">x =</span>
                                     <div className="flex flex-col items-center">
                                         <div className="border-b-2 border-gray-900 pb-1 mb-1 flex items-center">
                                             <span>-b ±</span>
                                             <span className="ml-2 flex items-start">
                                                 <span className="text-2xl md:text-3xl leading-none mt-[-2px]">√</span>
                                                 <span className="border-t-2 border-gray-900 pt-1 block ml-[-2px] px-1">b² - 4ac</span>
                                             </span>
                                         </div>
                                         <span className="pt-1">2a</span>
                                     </div>
                                 </div>
                             </div>
                         </div>

                     </div>
                 </div>

                 {/* BLOQUE 3: ESTADÍSTICA */}
                 <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-8">
                     <div className="bg-emerald-600 px-6 py-4">
                         <h2 className="text-lg font-bold text-white">3. Manejo de la Información Estadística</h2>
                     </div>
                     <div className="p-4 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                         
                         <div className="bg-emerald-50 p-5 rounded-xl border border-emerald-100 flex flex-col justify-center">
                             <h3 className="font-black text-emerald-800 mb-4">Medidas de Tendencia Central</h3>
                             <div className="space-y-4">
                                 <div className="flex items-start">
                                     <div className="bg-white p-2 rounded shadow-sm mr-3 font-bold text-emerald-600 text-sm">Media</div>
                                     <p className="text-sm text-gray-700 mt-1">Sumar todos los datos y dividir entre el número total de datos (Promedio).</p>
                                 </div>
                                 <div className="flex items-start">
                                     <div className="bg-white p-2 rounded shadow-sm mr-3 font-bold text-emerald-600 text-sm">Moda</div>
                                     <p className="text-sm text-gray-700 mt-1">El dato que más se repite.</p>
                                 </div>
                                 <div className="flex items-start">
                                     <div className="bg-white p-2 rounded shadow-sm mr-3 font-bold text-emerald-600 text-sm">Mediana</div>
                                     <p className="text-sm text-gray-700 mt-1">El dato que está en el medio (si hay dos, se saca su promedio).</p>
                                 </div>
                             </div>
                         </div>

                         <div className="bg-teal-50 p-5 rounded-xl border border-teal-100 flex flex-col justify-center items-center text-center">
                             <h3 className="font-black text-teal-800 mb-4">Probabilidad y Frecuencia</h3>
                             <p className="text-sm text-gray-700 mb-4"><b>Frecuencia absoluta:</b> Veces que se repite un evento.</p>
                             
                             <div className="flex items-center justify-center bg-white p-4 rounded-xl shadow-sm border border-teal-200">
                                 <span className="font-bold text-teal-900 mr-3">Probabilidad =</span>
                                 <div className="flex flex-col items-center font-bold text-teal-700 text-sm md:text-base">
                                     <span className="border-b-2 border-teal-700 px-2 pb-1">Eventos Favorables</span>
                                     <span className="pt-1">Total de Eventos Posibles</span>
                                 </div>
                             </div>
                         </div>

                     </div>
                 </div>

                 {/* BLOQUE 4: GEOMETRÍA Y TRIGONOMETRÍA */}
                 <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-8">
                     <div className="bg-rose-600 px-6 py-4">
                         <h2 className="text-lg font-bold text-white">4. Formas Geométricas y Semejanza</h2>
                     </div>
                     <div className="p-4 md:p-8">
                         
                         <div className="grid grid-cols-1 gap-8 mb-10 border-b border-gray-100 pb-10">
                             
                             {/* Ángulos entre paralelas */}
                             <div className="bg-rose-50 p-6 rounded-2xl border border-rose-100">
                                 <h3 className="font-black text-rose-800 mb-4 text-center">Ángulos entre Paralelas</h3>
                                 <div className="flex flex-col md:flex-row items-center gap-6">
                                     <div className="w-full md:w-1/2 bg-white rounded-xl shadow-inner p-4 border border-gray-200">
                                         <svg viewBox="0 0 200 200" className="w-full max-w-[240px] mx-auto">
                                             {/* Líneas horizontales */}
                                             <line x1="20" y1="60" x2="180" y2="60" stroke="#334155" strokeWidth="3" />
                                             <line x1="20" y1="140" x2="180" y2="140" stroke="#334155" strokeWidth="3" />
                                             {/* Transversal (cruza exactamente en (80,60) y (120,140)) */}
                                             <line x1="50" y1="0" x2="150" y2="200" stroke="#334155" strokeWidth="3" />
                                             
                                             {/* Etiquetas milimétricamente centradas en cada cuadrante */}
                                             {/* Intersección Superior (80,60) */}
                                             <text x="50" y="50" fill="#ef4444" fontSize="16" fontWeight="bold" textAnchor="middle">A</text>
                                             <text x="110" y="50" fill="#3b82f6" fontSize="16" fontWeight="bold" textAnchor="middle">B</text>
                                             <text x="50" y="90" fill="#3b82f6" fontSize="16" fontWeight="bold" textAnchor="middle">C</text>
                                             <text x="110" y="90" fill="#ef4444" fontSize="16" fontWeight="bold" textAnchor="middle">D</text>

                                             {/* Intersección Inferior (120,140) */}
                                             <text x="90" y="130" fill="#ef4444" fontSize="16" fontWeight="bold" textAnchor="middle">E</text>
                                             <text x="150" y="130" fill="#3b82f6" fontSize="16" fontWeight="bold" textAnchor="middle">F</text>
                                             <text x="90" y="170" fill="#3b82f6" fontSize="16" fontWeight="bold" textAnchor="middle">G</text>
                                             <text x="150" y="170" fill="#ef4444" fontSize="16" fontWeight="bold" textAnchor="middle">H</text>
                                         </svg>
                                     </div>
                                     <div className="w-full md:w-1/2 text-sm text-gray-700 bg-white p-5 rounded-xl shadow-sm">
                                         <p className="mb-3"><b>Opuestos por el vértice:</b><br/> <span className="text-red-600 font-bold bg-red-50 px-1 rounded">A = D</span>, <span className="text-blue-600 font-bold bg-blue-50 px-1 rounded">C = B</span>, <span className="text-red-600 font-bold bg-red-50 px-1 rounded">E = H</span>, <span className="text-blue-600 font-bold bg-blue-50 px-1 rounded">G = F</span></p>
                                         <p className="mb-3"><b>Alternos (internos y externos):</b><br/> <span className="text-red-600 font-bold bg-red-50 px-1 rounded">A = H</span>, <span className="text-blue-600 font-bold bg-blue-50 px-1 rounded">G = B</span></p>
                                         <p className="border-t pt-2"><b>Suman 180° (Suplementarios):</b><br/> A+B = 180°, C+D = 180°, G+H = 180°</p>
                                     </div>
                                 </div>
                             </div>

                             {/* Triángulo, Pitágoras, Desigualdades y Suma de Ángulos */}
                             <div className="bg-purple-50 p-6 rounded-2xl border border-purple-100">
                                 <h3 className="font-black text-purple-800 mb-6 text-center">Trigonometría y Propiedades del Triángulo</h3>
                                 <div className="flex flex-col md:flex-row items-center gap-8">
                                     
                                     {/* Dibujo del Triángulo Corregido */}
                                     <div className="w-full md:w-1/3 bg-white rounded-xl shadow-inner p-4 border border-gray-200">
                                         <svg viewBox="0 0 220 220" className="w-full max-w-[220px] mx-auto">
                                             {/* Triángulo Base */}
                                             <polygon points="50,170 170,170 170,50" fill="#f3e8ff" stroke="#7e22ce" strokeWidth="3" />
                                             {/* Ángulo recto */}
                                             <rect x="150" y="150" width="20" height="20" fill="none" stroke="#ef4444" strokeWidth="2" />
                                             {/* Ángulo de referencia θ */}
                                             <path d="M 85 170 A 35 35 0 0 0 75 145" fill="none" stroke="#3b82f6" strokeWidth="2"/>
                                             <text x="92" y="162" fill="#3b82f6" fontSize="16" fontWeight="bold">θ</text>
                                             
                                             {/* Etiquetas Perfectamente Alineadas */}
                                             <text x="110" y="195" fill="#1f2937" fontSize="14" fontWeight="bold" textAnchor="middle">Cat. Ady. (a)</text>
                                             <text x="185" y="110" fill="#1f2937" fontSize="14" fontWeight="bold" textAnchor="middle" transform="rotate(-90 185,110)">Cat. Op. (b)</text>
                                             <text x="95" y="95" fill="#1f2937" fontSize="14" fontWeight="bold" textAnchor="middle" transform="rotate(-45 95,95)">Hipotenusa (c)</text>
                                         </svg>
                                     </div>

                                     {/* Fórmulas y Teoremas */}
                                     <div className="w-full md:w-2/3 grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm text-gray-700">
                                         
                                         {/* Columna 1 */}
                                         <div className="space-y-4">
                                             <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-purple-500 text-center">
                                                 <span className="block text-[11px] uppercase font-bold text-gray-400 mb-1">Teorema de Pitágoras</span>
                                                 <span className="font-serif text-xl font-bold text-purple-900">a² + b² = c²</span>
                                             </div>
                                             
                                             <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-rose-500">
                                                 <span className="block text-[11px] uppercase font-bold text-gray-400 mb-1 text-center">Suma de Ángulos</span>
                                                 <p className="text-xs leading-tight text-center text-gray-700 mt-1">
                                                     La suma de los ángulos internos de un triángulo <b>siempre es 180°</b>.
                                                 </p>
                                             </div>
                                         </div>

                                         {/* Columna 2 */}
                                         <div className="space-y-4">
                                             <div className="bg-white p-4 rounded-xl shadow-sm border-l-4 border-emerald-500">
                                                 <span className="block text-[11px] uppercase font-bold text-gray-400 mb-1 text-center">T. de Desigualdades</span>
                                                 <p className="text-xs leading-tight text-gray-700 text-center mt-1">
                                                     La suma de las medidas de dos lados cualesquiera es <b>siempre mayor</b> que la medida del lado sobrante.
                                                 </p>
                                             </div>

                                             <div className="bg-white p-3 rounded-xl shadow-sm border-l-4 border-blue-500 text-xs font-bold space-y-2">
                                                 <span className="block text-[11px] uppercase font-bold text-gray-400 mb-2 text-center">Razones Trigonométricas</span>
                                                 <div className="flex justify-between items-center bg-blue-50 p-1.5 rounded"><span className="text-blue-700 text-sm">Seno</span> <span className="text-[11px] text-gray-600">Opuesto / Hipotenusa</span></div>
                                                 <div className="flex justify-between items-center bg-blue-50 p-1.5 rounded"><span className="text-blue-700 text-sm">Coseno</span> <span className="text-[11px] text-gray-600">Adyacente / Hipotenusa</span></div>
                                                 <div className="flex justify-between items-center bg-blue-50 p-1.5 rounded"><span className="text-blue-700 text-sm">Tangente</span> <span className="text-[11px] text-gray-600">Opuesto / Adyacente</span></div>
                                             </div>
                                         </div>

                                     </div>
                                 </div>
                             </div>

                         </div>

                         {/* Fórmulas de Áreas, Perímetros y Volúmenes */}
                         <h3 className="font-black text-rose-900 mb-6 text-center text-xl">Áreas, Perímetros y Volúmenes (π = 3.1416)</h3>
                         <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4">
                             
                             <div className="bg-white border-2 border-sky-100 p-4 rounded-2xl text-center shadow-sm hover:shadow-md transition">
                                 <svg viewBox="0 0 24 24" className="w-10 h-10 mx-auto mb-3 text-sky-500" fill="currentColor"><rect x="4" y="6" width="16" height="12" rx="1"/></svg>
                                 <h4 className="font-black text-[11px] uppercase text-sky-800 tracking-wider">Cuadrilátero</h4>
                                 <div className="mt-3 text-left bg-sky-50 p-2 rounded-lg">
                                    <p className="text-xs text-gray-700"><b className="text-sky-700">Área:</b> b × h</p>
                                    <p className="text-xs text-gray-700"><b className="text-sky-700">Perím:</b> (b + h) × 2</p>
                                 </div>
                             </div>

                             <div className="bg-white border-2 border-green-100 p-4 rounded-2xl text-center shadow-sm hover:shadow-md transition">
                                 <svg viewBox="0 0 24 24" className="w-10 h-10 mx-auto mb-3 text-green-500" fill="currentColor"><polygon points="12,3 22,20 2,20"/></svg>
                                 <h4 className="font-black text-[11px] uppercase text-green-800 tracking-wider">Triángulo</h4>
                                 <div className="mt-3 text-left bg-green-50 p-2 rounded-lg">
                                    <p className="text-xs text-gray-700 flex items-center gap-1"><b className="text-green-700">Área:</b> <span className="flex flex-col items-center leading-none text-[10px]"><span className="border-b border-gray-500 px-1">b × h</span><span>2</span></span></p>
                                    <p className="text-xs text-gray-700 mt-1"><b className="text-green-700">Perím:</b> a + b + c</p>
                                 </div>
                             </div>

                             <div className="bg-white border-2 border-purple-100 p-4 rounded-2xl text-center shadow-sm hover:shadow-md transition">
                                 <svg viewBox="0 0 24 24" className="w-10 h-10 mx-auto mb-3 text-purple-500" fill="currentColor"><circle cx="12" cy="12" r="9"/></svg>
                                 <h4 className="font-black text-[11px] uppercase text-purple-800 tracking-wider">Círculo</h4>
                                 <div className="mt-3 text-left bg-purple-50 p-2 rounded-lg">
                                    <p className="text-xs text-gray-700"><b className="text-purple-700">Área:</b> π × r²</p>

                             <div className="bg-white p-5 rounded-xl border border-red-200 shadow-sm">
                                 <h3 className="font-black text-red-800 mb-3 border-b pb-2">Calentamiento Global</h3>
                                 <p className="text-xs text-gray-700 mb-2"><b>Causa:</b> La interacción humana (fábricas, autos, quemar combustibles fósiles y deforestación) libera un <i>exceso</i> de CO₂ y gases de efecto invernadero que la naturaleza no alcanza a reciclar.</p>
                                 <p className="text-xs text-gray-700"><b>Consecuencias:</b> Estos gases atrapan el calor del sol en la atmósfera, elevando la temperatura de la Tierra. Causa derretimiento de polos, sequías extremas y extinción de especies.</p>
                             </div>
                         </div>

                     </div>
                 </div>

                 {/* BLOQUE 5: REPRODUCCIÓN Y SEXUALIDAD */}
                 <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-8">
                     <div className="bg-fuchsia-600 px-6 py-4">
                         <h2 className="text-lg font-bold text-white">5. Reproducción y Sexualidad Humana</h2>
                     </div>
                     <div className="p-4 md:p-8">
                         
                         {/* Mitosis vs Meiosis */}
                         <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                             <div className="bg-fuchsia-50 p-4 rounded-xl border border-fuchsia-200">
                                 <h3 className="font-black text-fuchsia-800 text-center mb-2">MITOSIS</h3>
                                 <p className="text-xs text-center text-gray-600 mb-2">Reproducción de células del cuerpo (somáticas).</p>
                                 <ul className="text-xs text-gray-700 bg-white p-3 rounded shadow-sm space-y-1">
                                     <li>✅ Resultan <b>2</b> células hijas idénticas.</li>
                                     <li>✅ Mantienen los mismos cromosomas (Diploides).</li>
                                     <li>✅ Sirve para crecer y sanar heridas.</li>
                                 </ul>
                             </div>
                             <div className="bg-rose-50 p-4 rounded-xl border border-rose-200">
                                 <h3 className="font-black text-rose-800 text-center mb-2">MEIOSIS</h3>
                                 <p className="text-xs text-center text-gray-600 mb-2">Creación de células sexuales (Espermatozoide/Óvulo).</p>
                                 <ul className="text-xs text-gray-700 bg-white p-3 rounded shadow-sm space-y-1">
                                     <li>✅ Resultan <b>4</b> células diferentes.</li>
                                     <li>✅ Tienen <b>la mitad</b> de los cromosomas (Haploides).</li>
                                     <li>✅ Genera variabilidad genética para la evolución.</li>
                                 </ul>
                             </div>
                         </div>

                         <h3 className="font-black text-fuchsia-900 mb-4 text-center border-t pt-6">Métodos Anticonceptivos e I.T.S.</h3>
                         <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                             {/* Anticonceptivos */}
                             <div className="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
                                 <div className="bg-slate-200 px-4 py-2 font-bold text-slate-800 text-sm">Tipos de Métodos</div>
                                 <div className="p-4 space-y-3 text-sm">
                                     <p><b>🛡️ Barrera:</b> Impiden físicamente que el esperma llegue. Condón (masc/fem), DIU de cobre. <br/><span className="text-xs text-emerald-600 font-bold bg-emerald-50 px-1 rounded">Solo el condón protege de ETS.</span></p>
                                     <p><b>💊 Hormonales:</b> Evitan la ovulación. Pastillas, parches, inyecciones, implantes.</p>
                                     <p><b>✂️ Definitivos/Quirúrgicos:</b> Cortar o ligar conductos. Vasectomía (hombres), Salpingoclasia (mujeres).</p>
                                     <p><b>📅 Naturales:</b> Ritmo, temperatura. Son muy poco seguros.</p>
                                 </div>
                             </div>

                             {/* ETS */}
                             <div className="bg-red-50 border border-red-200 rounded-xl overflow-hidden">
                                 <div className="bg-red-200 px-4 py-2 font-bold text-red-800 text-sm">Infecciones de Transmisión Sexual (ITS)</div>
                                 <div className="p-4 space-y-2 text-sm text-gray-700">
                                     <p>🔴 <b>VIH (Virus):</b> Ataca y destruye el sistema inmunológico. Causa la enfermedad del SIDA.</p>
                                     <p>🔴 <b>VPH (Virus del Papiloma):</b> Causa verrugas. Es la principal causa del cáncer cervicouterino.</p>
                                     <p>🔴 <b>Sífilis (Bacteria):</b> Produce llagas indoloras, luego sarpullido. Si no se trata con antibióticos, daña el cerebro y corazón.</p>
                                     <p>🔴 <b>Gonorrea (Bacteria):</b> Causa ardor al orinar y secreciones con pus.</p>
                                 </div>
                             </div>
                         </div>

                     </div>
                 </div>

                 {/* BLOQUE 6: GENÉTICA Y BIOTECNOLOGÍA */}
                 <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-8">
                     <div className="bg-indigo-600 px-6 py-4">
                         <h2 className="text-lg font-bold text-white">6. Genética y Biotecnología</h2>
                     </div>
                     <div className="p-4 md:p-8">
                         
                         <div className="bg-slate-50 border border-slate-200 p-5 rounded-xl mb-6 flex flex-col md:flex-row gap-6 items-center">
                             <div className="flex-1 text-sm text-gray-700 space-y-3">
                                 <h3 className="font-black text-indigo-800 text-lg border-b pb-1">Genética Clásica (Gregor Mendel)</h3>
                                 <p><b>Fenotipo:</b> Rasgos físicos <i>visibles</i> (ej. color de ojos, altura).</p>
                                 <p><b>Genotipo:</b> Información genética <i>interna</i> oculta en el ADN.</p>
                                 <p><b>Gen Dominante:</b> Característica que siempre se manifiesta si está presente (Mayúscula 'A').</p>
                                 <p><b>Gen Recesivo:</b> Queda oculto. Solo se manifiesta si se hereda de <i>ambos</i> padres ('a').</p>
                             </div>
                             <div className="w-full md:w-1/3 bg-white p-4 rounded-lg shadow border border-indigo-100 text-center">
                                <span className="text-4xl">🧬</span>
                                <p className="text-xs text-gray-500 mt-2 font-bold">ADN: Ácido Desoxirribonucleico.<br/>Almacena las instrucciones de la vida.</p>
                             </div>
                         </div>

                         <h3 className="font-black text-indigo-900 mb-4 border-b pb-2">Manipulación Genética (Transgénicos)</h3>
                         <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                             <div className="bg-emerald-50 p-5 rounded-xl border-l-4 border-emerald-500 shadow-sm">
                                 <h4 className="font-black text-emerald-800 text-base mb-3 flex items-center"><span className="mr-2">✅</span> Beneficios</h4>
                                 <ul className="text-xs text-gray-700 space-y-3">
                                     <li>• Producción rápida de fármacos y vacunas.</li>
                                     <li>• <b>Transgénicos:</b> Cultivos modificados para resistir plagas o sequías, combatiendo el hambre mundial.</li>
                                     <li>• Oportunidad de "corregir" enfermedades hereditarias editando el ADN.</li>
                                 </ul>
                             </div>
                             <div className="bg-rose-50 p-5 rounded-xl border-l-4 border-rose-500 shadow-sm">
                                 <h4 className="font-black text-rose-800 text-base mb-3 flex items-center"><span className="mr-2">⚠️</span> Riesgos</h4>
                                 <ul className="text-xs text-gray-700 space-y-3">
                                     <li>• Las especies mutadas compiten con las naturales, <b>reduciendo y empobreciendo la biodiversidad</b>.</li>
                                     <li>• Se desconocen los efectos a largo plazo en la salud humana por consumir transgénicos.</li>
                                     <li>• Posible desequilibrio ecológico si se cruzan con especies silvestres.</li>
                                 </ul>
                             </div>
                         </div>

                     </div>
                 </div>

             </div>
        );
        const App = () => {
            const [activeTab, setActiveTab] = useState("HISTORIA DE MÉXICO");

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white shadow-sm sticky top-0 z-10">
                        <div className="max-w-6xl mx-auto px-4 py-4">
                            <h1 className="text-xl md:text-2xl font-black text-indigo-900 flex items-center gap-2">
                                <span className="text-2xl">📚</span> PrepaExamen
                                <span className="ml-2 text-xs md:text-sm font-bold text-white bg-indigo-500 px-3 py-1 rounded-full">Secundaria</span>
                            </h1>
                        </div>
                        <div className="max-w-6xl mx-auto px-4 overflow-x-auto custom-scrollbar">
                            <div className="flex space-x-2 pb-3">
                                {SUBJECTS.map((subject) => (
                                    <button
                                        key={subject}
                                        onClick={() => setActiveTab(subject)}
                                        className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all ${
                                            activeTab === subject 
                                                ? 'bg-indigo-600 text-white shadow-md transform scale-105' 
                                                : 'bg-white border border-gray-200 text-gray-500 hover:bg-gray-100'
                                        }`}
                                    >
                                        {subject}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-6xl mx-auto px-4 py-6 md:py-10 w-full">
                        {activeTab === "FÍSICA" ? <FisicaView /> : 
                         activeTab === "HISTORIA UNIVERSAL" ? <HistoriaUniversalView /> : 
                         activeTab === "HISTORIA DE MÉXICO" ? <HistoriaMexicoView /> : 
                         activeTab === "QUIMICA" ? <QuimicaView /> :
                         activeTab === "MATEMÁTICAS" ? <MatematicasView /> :
                         activeTab === "ESPAÑOL" ? <EspanolView /> :
                         activeTab === "GEOGRAFÍA" ? <GeografiaView /> :
                         activeTab === "BIOLOGÍA" ? <BiologiaView /> :
                        (
                            <div className="flex flex-col items-center justify-center h-[60vh] text-center bg-white rounded-2xl shadow-sm border border-dashed border-gray-300 p-6">
                                <div className="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mb-6"><span className="text-4xl">🚧</span></div>
                                <h2 className="text-2xl font-bold text-gray-800 mb-2">Sección en Construcción</h2>
                                <p className="text-gray-500 max-w-md mb-8">Preparando el material de estudio para <b>{activeTab}</b>.</p>
                                <button onClick={() => setActiveTab("HISTORIA DE MÉXICO")} className="px-6 py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700">Ir a Historia de México</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
